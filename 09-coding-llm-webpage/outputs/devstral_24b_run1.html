<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive 3D Solar System</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
        }
        #info-card {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px;
            border-radius: 5px;
            display: none;
        }
        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
        }
        #planet-list {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px;
            border-radius: 5px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .planet-item {
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="info-card"></div>
    <div id="controls">
        <button id="toggle-play">Play</button>
        <label for="speed-control">Speed:</label>
        <input type="range" id="speed-control" min="0.5" max="5" step="0.1" value="1">
        <button id="toggle-view">Perspective View</button>
    </div>
    <div id="planet-list">
        <h3>Planets</h3>
        <div class="planet-item" data-planet="Sun">Sun</div>
        <div class="planet-item" data-planet="Mercury">Mercury</div>
        <div class="planet-item" data-planet="Venus">Venus</div>
        <div class="planet-item" data-planet="Earth">Earth</div>
        <div class="planet-item" data-planet="Mars">Mars</div>
        <div class="planet-item" data-planet="Jupiter">Jupiter</div>
        <div class="planet-item" data-planet="Saturn">Saturn</div>
        <div class="planet-item" data-planet="Uranus">Uranus</div>
        <div class="planet-item" data-planet="Neptune">Neptune</div>
    </div>
    <canvas id="solar-system"></canvas>

    <script>
        const canvas = document.getElementById('solar-system');
        const ctx = canvas.getContext('2d');
        const infoCard = document.getElementById('info-card');

        let animationFrame;
        let isPlaying = true;
        let speed = 1;
        let perspectiveView = true;

        // Starfield background
        function drawStars() {
            for (let i = 0; i < 50; i++) {
                ctx.fillStyle = 'white';
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                ctx.beginPath();
                ctx.arc(x, y, Math.random(), 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Planets data
        const planets = [
            {name: 'Sun', radius: 695700, color: 'orange', distance: 0, orbitalPeriod: 0, funFact: 'The Sun is a star'},
            {name: 'Mercury', radius: 2439.7, color: 'gray', distance: 57.91, orbitalPeriod: 87.97, funFact: 'Smallest planet in our solar system.'},
            {name: 'Venus', radius: 6051.8, color: 'yellow', distance: 108.2, orbitalPeriod: 224.7, funFact: 'Hottest planet due to greenhouse effect.'},
            {name: 'Earth', radius: 6371, color: 'blue', distance: 149.6, orbitalPeriod: 365.25, funFact: 'Only known planet with life.'},
            {name: 'Mars', radius: 3389.5, color: 'red', distance: 227.9, orbitalPeriod: 686.98, funFact: 'Known as the red planet due to iron oxide on its surface.'},
            {name: 'Jupiter', radius: 69911, color: 'orange', stripes: true, distance: 778.3, orbitalPeriod: 4322.59, funFact: 'Largest planet in our solar system.'},
            {name: 'Saturn', radius: 58232, color: 'goldenrod', rings: true, distance: 1426.7, orbitalPeriod: 10752.2, funFact: 'Least dense planet - would float on water.'},
            {name: 'Uranus', radius: 25362, color: 'cyan', distance: 2870.9, orbitalPeriod: 30664.5, funFact: 'Rotates sideways with an axial tilt of 98 degrees.'},
            {name: 'Neptune', radius: 24622, color: 'blue', distance: 4495.1, orbitalPeriod: 60190, funFact: 'Strongest winds in the solar system - up to 2000 km/h.'}
        ];

        // Orbital paths
        function drawOrbits() {
            ctx.strokeStyle = '#ffffff30';
            ctx.lineWidth = 0.5;
            ctx.setLineDash([4, 8]);
            for (let planet of planets) {
                if (planet.distance > 0) {
                    const radius = planet.distance * 10;
                    ctx.beginPath();
                    ctx.arc(canvas.width / 2, canvas.height / 2, radius, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }
        }

        // Draw planets
        function drawPlanet(planet, angle) {
            const radius = planet.radius * 0.1;
            const distance = planet.distance * 10;

            let x = canvas.width / 2 + Math.cos(angle) * distance;
            let y = canvas.height / 2 + Math.sin(angle) * distance;

            if (!perspectiveView) {
                x = canvas.width / 2 + (Math.cos(angle) * distance);
                y = canvas.height / 2 + (Math.sin(angle) * distance);
            } else {
                const perspectiveFactor = 0.1;
                x += (canvas.width / 2 - x) * perspectiveFactor;
                y += (canvas.height / 2 - y) * perspectiveFactor;
            }

            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            if (planet.name === 'Sun') {
                const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
                gradient.addColorStop(0, '#FFD700');
                gradient.addColorStop(1, '#FFA500');
                ctx.fillStyle = gradient;
            } else if (planet.name === 'Jupiter') {
                ctx.fillStyle = planet.color;
                // Draw stripes
                for (let i = 0; i < 4; i++) {
                    const stripeAngle = Math.PI / 2 * i;
                    const stripeX = x + Math.cos(stripeAngle) * radius * 1.5;
                    const stripeY = y + Math.sin(stripeAngle) * radius * 1.5;
                    ctx.beginPath();
                    ctx.arc(stripeX, stripeY, radius / 4, 0, Math.PI * 2);
                    ctx.fillStyle = planet.color === 'orange' ? '#FF8C00' : '#CD853F';
                    ctx.fill();
                }
            } else if (planet.name === 'Saturn') {
                // Draw rings
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(angle + Math.PI / 2);
                ctx.beginPath();
                const ringRadius = radius * 1.8;
                ctx.ellipse(0, 0, ringRadius, ringRadius * 0.4, 0, 0, Math.PI * 2);
                ctx.fillStyle = '#D2B48C';
                ctx.fill();
                ctx.restore();
            } else {
                ctx.fillStyle = planet.color;
            }
            ctx.fill();
        }

        // Animation loop
        let angles = planets.map(() => Math.random() * Math.PI * 2);
        function animate() {
            if (!isPlaying) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawStars();
            drawOrbits();

            for (let i = 0; i < planets.length; i++) {
                let planet = planets[i];
                angles[i] += speed * planet.orbitalPeriod / 10000;

                if (planet.name === 'Sun') {
                    ctx.save();
                    ctx.translate(canvas.width / 2, canvas.height / 2);
                    ctx.rotate(angles[i]);
                    drawPlanet(planet, 0);
                    ctx.restore();
                } else {
                    drawPlanet(planet, angles[i]);
                }
            }

            animationFrame = requestAnimationFrame(animate);
        }

        // Event listeners
        document.getElementById('toggle-play').addEventListener('click', () => {
            isPlaying = !isPlaying;
            if (isPlaying) {
                animate();
            } else {
                cancelAnimationFrame(animationFrame);
            }
            document.getElementById('toggle-play').textContent = isPlaying ? 'Pause' : 'Play';
        });

        document.getElementById('speed-control').addEventListener('input', (e) => {
            speed = parseFloat(e.target.value);
        });

        document.getElementById('toggle-view').addEventListener('click', () => {
            perspectiveView = !perspectiveView;
            document.getElementById('toggle-view').textContent = perspectiveView ? 'Top-down View' : 'Perspective View';
        });

        document.querySelectorAll('.planet-item').forEach(item => {
            item.addEventListener('click', () => {
                const planetName = item.dataset.planet;
                showInfoCard(planets.find(p => p.name === planetName));
            });
        });

        canvas.addEventListener('mousemove', (e) => {
            let rect = canvas.getBoundingClientRect();
            let x = e.clientX - rect.left;
            let y = e.clientY - rect.top;

            for (let i = planets.length - 1; i >= 0; i--) {
                let planet = planets[i];
                if (planet.name === 'Sun') continue;

                const distanceFromCenter = Math.sqrt(Math.pow(x - canvas.width / 2, 2) + Math.pow(y - canvas.height / 2, 2));
                const radius = planet.radius * 0.1;
                const distance = planet.distance * 10;

                if (distanceFromCenter <= distance + radius && distanceFromCenter >= distance - radius) {
                    showHoverInfo(planet);
                    return;
                }
            }
            hideHoverInfo();
        });

        canvas.addEventListener('click', (e) => {
            let rect = canvas.getBoundingClientRect();
            let x = e.clientX - rect.left;
            let y = e.clientY - rect.top;

            for (let planet of planets) {
                if (planet.name === 'Sun') continue;

                const distanceFromCenter = Math.sqrt(Math.pow(x - canvas.width / 2, 2) + Math.pow(y - canvas.height / 2, 2));
                const radius = planet.radius * 0.1;
                const distance = planet.distance * 10;

                if (distanceFromCenter <= distance + radius && distanceFromCenter >= distance - radius) {
                    showInfoCard(planet);
                    return;
                }
            }
        });

        function showHoverInfo(planet) {
            infoCard.innerHTML = `<strong>${planet.name}</strong>`;
            infoCard.style.display = 'block';
        }

        function hideHoverInfo() {
            infoCard.style.display = 'none';
        }

        function showInfoCard(planet) {
            infoCard.innerHTML = `
                <strong>${planet.name}</strong><br>
                Distance from Sun: ${planet.distance} million km<br>
                Orbital Period: ${planet.orbitalPeriod.toFixed(2)} days<br>
                Fun Fact: ${planet.funFact}
            `;
            infoCard.style.display = 'block';
        }

        // Initialize
        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            drawStars();
            animate();

            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
        }

        init();
    </script>
</body>
</html>
